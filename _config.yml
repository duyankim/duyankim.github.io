# --------------------------------------------------------------
# Bank-End Chronicles — Minimal Mistakes 설정
# --------------------------------------------------------------

# 테마
remote_theme            : "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin   : "default" # "default", "air", "aqua", "contrast", "dark", "dirt", "mint", "neon", "plum", "sunrise"

# 사이트 기본
locale                  : "ko-KR"
title                   : "Bank-End Chronicles"
title_separator         : "|"
subtitle                : "개발 공부 기록 | Java developer"
name                    : "Duyan Kim"
description             : "우리는 읽은 것으로 만들어지고, 기록되지 않은 것은 기억되지 않는다."
url                     : "https://duyankim.github.io"
baseurl                 : ""
repository              : "duyankim/duyankim.github.io"
teaser                  : # 포스트 카드 기본 대표 이미지 (img/ 하위 파일 사용 가능)
logo                    : "/img/nyancat.gif"
masthead_title          : # 상단 제목 (title과 같으면 비움)
breadcrumbs             : true
words_per_minute        : 200
future                  : true

# 댓글 — utterances (GitHub Issues 기반)
comments:
  provider              : "utterances"
  utterances:
    theme               : "github-light" # "github-light", "github-dark"
    issue_term          : "pathname"

# 검색 (Lunr)
search                  : true
search_full_content     : true
search_provider         : "lunr"
lunr:
  search_within_pages   : true

# SEO
og_image                : "/img/nyancat.gif"
social:
  type                  : "Person"
  name                  : "Duyan Kim"
  links:
    - "https://github.com/duyankim"

# Google Analytics (GA4 ID 발급 후 기입)
analytics:
  provider              : false # "google-gtag" 로 바꾸고 아래 tracking_id 기입하면 활성화
  google:
    tracking_id         : # "G-XXXXXXXXXX"
    anonymize_ip        : false

# 사이트 저자 프로필 (사이드바)
author:
  name                  : "Duyan Kim"
  avatar                : "/img/nyancat.gif"
  bio                   : "읽고, 배우고, 그리고 남긴다 😉"
  location              : "Seoul, Korea"
  links:
    - label             : "GitHub"
      icon              : "fab fa-fw fa-github"
      url               : "https://github.com/duyankim"
    - label             : "Email"
      icon              : "fas fa-fw fa-envelope-square"
      url               : "mailto:devduyan@gmail.com"

# 푸터 링크
footer:
  links:
    - label             : "GitHub"
      icon              : "fab fa-fw fa-github"
      url               : "https://github.com/duyankim"

# 빌드 설정
markdown                : kramdown
highlighter             : rouge
lsi                     : false
excerpt_separator       : "\n\n"
incremental             : false

kramdown:
  input                 : GFM
  hard_wrap             : false
  auto_ids              : true
  footnote_nr           : 1
  entity_output         : as_char
  toc_levels            : 1..6
  smart_quotes          : lsquo,rsquo,ldquo,rdquo
  enable_coderay        : false

sass:
  sass_dir              : _sass
  style                 : compressed

permalink               : /:year/:month/:day/:title/
paginate                : 10
paginate_path           : /page:num/
timezone                : Asia/Seoul

include:
  - _pages

exclude:
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - Rakefile
  - README.md
  - LICENSE
  - log
  - tmp

keep_files:
  - .git
  - .svn

encoding                : "utf-8"
markdown_ext            : "markdown,mkdown,mkdn,mkd,md"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-archives

# 아카이브 (카테고리/태그 페이지)
category_archive:
  type                  : liquid
  path                  : /categories/
tag_archive:
  type                  : liquid
  path                  : /tags/

# jekyll-archives (GitHub Pages에서는 미지원이지만 로컬 빌드 시 사용 가능)
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category            : archive-taxonomy
    tag                 : archive-taxonomy
  permalinks:
    category            : /categories/:name/
    tag                 : /tags/:name/

# 기본 front-matter
defaults:
  # _posts
  - scope:
      path              : ""
      type              : posts
    values:
      layout            : single
      author_profile    : true
      read_time         : true
      comments          : true
      share             : true
      related           : true
      toc               : true
      toc_sticky        : true
      show_date         : true
  # _pages
  - scope:
      path              : "_pages"
      type              : pages
    values:
      layout            : single
      author_profile    : true
