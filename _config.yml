# --------------------------------------------------------------
# Bank-End Chronicles — Chirpy 설정
# https://github.com/cotes2020/jekyll-theme-chirpy
# --------------------------------------------------------------

theme: jekyll-theme-chirpy

# 사이트 기본
lang: ko-KR
timezone: Asia/Seoul

title: Bank-End Chronicles
tagline: "「Memory gets GC'd, but this blog stays committed.」"
description: >-
  우리는 읽은 것으로 만들어지고, 기록되지 않은 것은 기억되지 않는다.
  그래서 나는 읽고, 배우고, 그리고 남긴다.

url: "https://duyankim.github.io"

# GitHub / Social
github:
  username: duyankim

social:
  name: Duyan Kim
  email: devduyan@gmail.com
  links:
    - https://github.com/duyankim

# ------------------------------------------------------------
# 외관
# ------------------------------------------------------------
# light, dark, auto (시스템 설정 따라감)
theme_mode: # [light | dark]  # 비워두면 사용자가 토글 가능

# 메인 색상은 기본값 사용

# 사이트 이미지
img_cdn:
avatar: /img/nyancat.gif
social_preview_image: /img/nyancat.gif

# 포스트 상단 스크롤 바 (토스트 알림)
toc: true

# ------------------------------------------------------------
# 댓글 — Giscus (GitHub Discussions 기반)
#   https://giscus.app 에서 아래 값들을 발급받아 채우세요.
# ------------------------------------------------------------
comments:
  provider: giscus # [disqus | utterances | giscus]
  giscus:
    repo: "duyankim/duyankim.github.io"
    repo_id: # ex) "R_kgDOxxxxxx"  — giscus.app 에서 발급
    category: "Announcements"
    category_id: # ex) "DIC_kwDOxxxxxx"  — giscus.app 에서 발급
    mapping: pathname # [pathname | url | title | og:title]
    strict: "0"
    input_position: bottom # [top | bottom]
    lang: ko
    reactions_enabled: "1"
    emit_metadata: "0"

# ------------------------------------------------------------
# 분석 (Google Analytics)
#   GA4 트래킹 ID 받아서 아래에 채우면 활성화됩니다.
# ------------------------------------------------------------
analytics:
  google:
    id: # "G-XXXXXXXXXX"

# ------------------------------------------------------------
# 페이지 뷰 카운터
# ------------------------------------------------------------
pageviews:
  provider: # [goatcounter | ...]

# ------------------------------------------------------------
# 글 기본 설정
# ------------------------------------------------------------
# 포스트 URL 스타일
permalink: /posts/:year/:month/:day/:title/

# 페이지네이션
paginate: 10

# 대표 카테고리 아이콘(카테고리 아카이브 페이지 용) 등은 Chirpy가 내부 처리

# ------------------------------------------------------------
# Markdown / Syntax Highlight
# ------------------------------------------------------------
markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# ------------------------------------------------------------
# 컬렉션
# ------------------------------------------------------------
collections:
  tabs:
    output: true
    sort_by: order

# ------------------------------------------------------------
# 기본 front-matter
# ------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      # 포스트 내 모든 이미지 경로 앞에 붙일 prefix (Chirpy 기능)
      media_subpath: /
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # 탭(사이드바 메뉴) 페이지
    values:
      layout: page
      permalink: /:title/

# ------------------------------------------------------------
# Plugins (gem 들은 이미 Gemfile 에 포함)
# ------------------------------------------------------------
plugins:
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-include-cache

# ------------------------------------------------------------
# 아카이브 (jekyll-archives)
# ------------------------------------------------------------
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# ------------------------------------------------------------
# 빌드
# ------------------------------------------------------------
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

sass:
  style: compressed
